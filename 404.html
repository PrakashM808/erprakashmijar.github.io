<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Page Not Found | erprakashmijar.com</title>
  <meta name="robots" content="noindex, nofollow"/>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #020d06;
      --green: #00ff88;
      --muted: #4a7a62;
      --green-border: rgba(0,255,136,0.18);
      --mono: 'Share Tech Mono', monospace;
      --sans: 'Syne', sans-serif;
    }
    body {
      background: var(--bg);
      color: #fff;
      font-family: var(--mono);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }
    .container { position: relative; z-index: 1; }
    .error-code {
      font-family: var(--sans);
      font-size: clamp(6rem, 20vw, 12rem);
      font-weight: 800;
      color: var(--green);
      line-height: 1;
      opacity: 0.15;
      letter-spacing: -0.05em;
    }
    .error-label {
      font-size: 0.75rem;
      color: var(--green);
      letter-spacing: 0.25em;
      margin-bottom: 1rem;
    }
    h1 {
      font-family: var(--sans);
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      font-weight: 800;
      margin-bottom: 1rem;
      margin-top: -2rem;
    }
    p {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 2.5rem;
      line-height: 1.8;
    }
    a {
      font-family: var(--mono);
      font-size: 0.78rem;
      letter-spacing: 0.15em;
      padding: 0.85rem 2rem;
      background: var(--green);
      color: #020d06;
      font-weight: 700;
      text-decoration: none;
      border-radius: 2px;
      transition: background 0.2s;
    }
    a:hover { background: #fff; }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-code">404</div>
    <p class="error-label">// ACCESS DENIED</p>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist or has been moved.<br/>Let's get you back to secure ground.</p>
    <a href="/">RETURN HOME</a>
  </div>
</body>
</html>
